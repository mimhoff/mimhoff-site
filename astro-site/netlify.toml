[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/wordlock"
  to = "/wordlock/index.html"
  status = 200

[[redirects]]
  from = "/duck-tictactoe"
  to = "/duck-tictactoe/index.html"
  status = 200

[[redirects]]
  from = "/chain-4"
  to = "/chain-4/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
